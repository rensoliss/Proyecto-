<!-- NAVBAR -->
<header class="bg-[#4A7FD1] text-white fixed w-full top-0 z-50 shadow-md">

<h1 class="font-bold text-xl">

<nav class="space-x-6 hidden md:block">

<!-- EXPEDIENTE -->
<section id="expediente" class="py-12 bg-white text-center">
<h2 class="text-3xl font-bold text-[#4A7FD1] mb-6 hover:text-[#3F73C4] transition">Expediente Clínico</h2>

<form id="formExpediente" method="POST" class="max-w-xl mx-auto space-y-4 bg-white p-6 rounded-xl shadow-md">
<input type="text" name="nombre" placeholder="Nombre completo" required class="w-full border p-3 rounded focus:ring-2 focus:ring-blue-400">
<input type="number" name="edad" placeholder="Edad" required class="w-full border p-3 rounded focus:ring-2 focus:ring-blue-400">

<select name="sexo" class="w-full border p-3 rounded focus:ring-2 focus:ring-blue-400">
<option>Sexo</option>
<option>Masculino</option>
<option>Femenino</option>
</select>

<input type="text" name="sangre" placeholder="Tipo de sangre" class="w-full border p-3 rounded focus:ring-2 focus:ring-blue-400">

<input type="tel" name="telefono" placeholder="Teléfono" class="w-full border p-3 rounded focus:ring-2 focus:ring-blue-400">

<textarea name="antecedentes" placeholder="Antecedentes médicos" class="w-full border p-3 rounded focus:ring-2 focus:ring-blue-400"></textarea>

<button class="bg-[#4A7FD1] text-white px-6 py-3 rounded hover:bg-[#3F73C4] transition w-full">
Guardar Expediente
</button>

</form> 
<script>
document.getElementById("formExpediente").addEventListener("submit", function(e){
    e.preventDefault();

    const formData = {
        nombre: this.nombre.value,
        edad: this.edad.value,
        sexo: this.sexo.value,
        sangre: this.sangre.value,
        telefono: this.telefono.value,
        antecedentes: this.antecedentes.value
    };

    fetch("https://script.google.com/macros/s/AKfycbwm0rNhoXct7S7WJkHua7N4Joc3pJ2pOf6lsxr-FFwru0jDKvZ-R3LdDpWFtpGdrjTORA/exec", {
        method: "POST",
        body: JSON.stringify(formData)
    })
    .then(res => alert("Datos guardados correctamente"))
    .catch(err => alert("Error al guardar"));
});
</script>
</section>
