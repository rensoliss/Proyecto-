<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citas - Clínica Integral</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<!-- NAVBAR -->
<header class="bg-[#4A7FD1] text-white fixed w-full top-0 z-50 shadow-md">
  <div class="container mx-auto flex justify-between items-center p-4">
    <h1 class="font-bold text-xl">
      <i class="fas fa-heartbeat"></i> Clínica Integral
    </h1>

    <nav class="space-x-6 hidden md:block">
      <a href="index.html">Inicio</a>
      <a href="servicios.html">Servicios</a>
      <a href="nosotros.html">Nosotros</a>
      <a href="doctores.html">Doctores</a>
      <a href="expedientes.html">Expediente</a>
      <a href="resenas.html">Reseñas</a>
      <a href="citas.html" class="font-bold underline">Citas</a>
    </nav>
  </div>
</header>

<!-- MAIN -->
<main class="flex-1 flex items-center justify-center pt-24 px-4">

<section id="citas" class="w-full text-center">

  <h2 class="text-3xl font-bold text-[#4A7FD1] mb-8">
    Agendar Cita
  </h2>

  <!-- FORMULARIO -->
  <form id="formCitas"
    class="w-full max-w-3xl mx-auto bg-white p-10 rounded-xl space-y-6 shadow-lg">

    <!-- FILA 1 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

      <input type="text" name="nombre" placeholder="Nombre completo" required
        class="border p-4 rounded focus:ring-2 focus:ring-blue-400 w-full">

      <input type="email" name="correo" placeholder="Correo electrónico" required
        class="border p-4 rounded focus:ring-2 focus:ring-blue-400 w-full">

    </div>

    <!-- FILA 2 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

      <input type="tel" name="telefono" placeholder="Teléfono"
        class="border p-4 rounded focus:ring-2 focus:ring-blue-400 w-full">

      <input type="date" name="fecha" required
        class="border p-4 rounded focus:ring-2 focus:ring-blue-400 w-full">

    </div>

    <!-- ESPECIALIDAD -->
    <select name="especialidad"
      class="border p-4 rounded focus:ring-2 focus:ring-blue-400 w-full">

      <option>Selecciona especialidad</option>
      <option>Cardiología</option>
      <option>Pediatría</option>
      <option>Dermatología</option>
      <option>Ginecología</option>
      <option>Traumatología</option>
      <option>Nutrición</option>
      <option>Neurología</option>
      <option>Psicología</option>
      <option>Endocrinología</option>

    </select>

    <!-- MOTIVO -->
    <textarea name="motivo" placeholder="Motivo de la consulta"
      class="border p-4 rounded focus:ring-2 focus:ring-blue-400 w-full h-40"></textarea>

    <!-- BOTÓN -->
    <button class="bg-[#4A7FD1] text-white py-4 rounded hover:bg-[#3F73C4] transition w-full text-lg">
      Agendar Cita
    </button>

  </form>

</section>

</main>

<!-- FOOTER -->
<footer class="bg-[#4A7FD1] text-white text-center p-4 mt-auto">
  <p>© 2026 Clínica Integral</p>
</footer>

<!-- SCRIPT -->
<script>
document.getElementById("formCitas").addEventListener("submit", function(e){
    e.preventDefault();

    const formData = new FormData(this);

    fetch("https://script.google.com/macros/s/AKfycbylYOsYDSZCCqpxtmcUt4VV2ASV_syp2yZ8yJ8_HsOZHipIh4LelH8kUxC1B1EqmI1j-w/exec", {
        method: "POST",
        mode: "no-cors",
        body: formData
    })
    .then(() => {
        alert("Cita guardada correctamente ✅");
        this.reset();
    })
    .catch(() => {
        alert("Error al guardar ❌");
    });
});
</script>

</body>
</html>
